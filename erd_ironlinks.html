
<style>
#erd { width: 100%; }
#erd svg { width: 100% !important; height: auto !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a1a2e' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  SALA {
    number id_sala PK
    varchar nombre
    number aforo_max
    varchar descripcion
  }
  MONITOR {
    number id_monitor PK
    varchar nombre
    varchar apellidos
    varchar especialidad
    varchar telefono UK
    varchar email UK
    date fecha_alta
  }
  TARIFA {
    number id_tarifa PK
    varchar nombre
    number duracion_dias
    number precio
    varchar descripcion
    char activa
  }
  SOCIO {
    number id_socio PK
    varchar nif UK
    varchar nombre
    varchar apellidos
    date fecha_nac
    varchar telefono
    varchar email UK
    date fecha_alta
    varchar estado
  }
  CONTRATO {
    number id_contrato PK
    number id_socio FK
    number id_tarifa FK
    date fecha_inicio
    date fecha_fin
    number importe_pag
    varchar estado
  }
  CLASE {
    number id_clase PK
    varchar nombre
    number id_sala FK
    number id_monitor FK
    varchar dia_semana
    varchar hora_inicio
    number duracion_min
    number plazas_max
    number plazas_libres
    char activa
  }
  INSCRIPCION_CLASE {
    number id_inscripcion PK
    number id_socio FK
    number id_clase FK
    date fecha_insc
    char asistio
  }
  PAGO_CUOTA {
    number id_pago PK
    number id_contrato FK
    date fecha_pago
    number importe
    varchar metodo_pago
    varchar observaciones
  }
  AUDITORIA_SOCIOS {
    number id_auditoria PK
    number id_socio
    varchar accion
    varchar campo
    varchar valor_antes
    varchar valor_despues
    varchar usuario_bd
    date fecha_cambio
  }

  SOCIO ||--o{ CONTRATO : "firma"
  TARIFA ||--o{ CONTRATO : "aplica"
  CONTRATO ||--o{ PAGO_CUOTA : "genera"
  SOCIO ||--o{ INSCRIPCION_CLASE : "se inscribe"
  CLASE ||--o{ INSCRIPCION_CLASE : "tiene"
  SALA ||--o{ CLASE : "alberga"
  MONITOR ||--o{ CLASE : "imparte"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
